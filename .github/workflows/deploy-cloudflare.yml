name: Deploy to Cloudflare

on:
  push:
    branches:
      - master
      - '**'
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve pnpm store path
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache Next.js build artifacts
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', '**/*.mjs', '**/*.cjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Validate required secrets
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          BLOG_CLIENT_ID: ${{ secrets.BLOG_CLIENT_ID }}
          BLOG_REDIRECT_URI: ${{ secrets.BLOG_REDIRECT_URI }}
          BLOG_SIGNUP_FLOW_SLUG: ${{ secrets.BLOG_SIGNUP_FLOW_SLUG }}
          BLOG_SIGNUP_AUTHORIZATION_SPACE_ID: ${{ secrets.BLOG_SIGNUP_AUTHORIZATION_SPACE_ID }}
          BLOG_SIGNUP_TRIGGER_KIND: ${{ secrets.BLOG_SIGNUP_TRIGGER_KIND }}
          BLOG_SIGNUP_TRIGGER_CLIENT_ID: ${{ secrets.BLOG_SIGNUP_TRIGGER_CLIENT_ID }}
          BLOG_SIGNUP_TRIGGER_CLIENT_SECRET: ${{ secrets.BLOG_SIGNUP_TRIGGER_CLIENT_SECRET }}
          BLOG_SIGNUP_INTENT_TTL_SECONDS: ${{ secrets.BLOG_SIGNUP_INTENT_TTL_SECONDS }}
          PAYLOAD_BASE_URL: ${{ secrets.PAYLOAD_BASE_URL }}
          PAYLOAD_API_KEY: ${{ secrets.PAYLOAD_API_KEY }}
        run: |
          for var in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN AUTH_BASE_URL BLOG_CLIENT_ID BLOG_REDIRECT_URI BLOG_SIGNUP_FLOW_SLUG BLOG_SIGNUP_AUTHORIZATION_SPACE_ID BLOG_SIGNUP_TRIGGER_KIND BLOG_SIGNUP_TRIGGER_CLIENT_ID BLOG_SIGNUP_TRIGGER_CLIENT_SECRET BLOG_SIGNUP_INTENT_TTL_SECONDS PAYLOAD_BASE_URL PAYLOAD_API_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::$var is missing"
              exit 1
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Deploy to Cloudflare (Production)
        if: github.ref == 'refs/heads/master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.91.0
          command: deploy
          preCommands: pnpm exec opennextjs-cloudflare build
          secrets: |
            AUTH_BASE_URL
            BLOG_CLIENT_ID
            BLOG_REDIRECT_URI
            BLOG_SIGNUP_FLOW_SLUG
            BLOG_SIGNUP_AUTHORIZATION_SPACE_ID
            BLOG_SIGNUP_TRIGGER_KIND
            BLOG_SIGNUP_TRIGGER_CLIENT_ID
            BLOG_SIGNUP_TRIGGER_CLIENT_SECRET
            BLOG_SIGNUP_INTENT_TTL_SECONDS
            PAYLOAD_BASE_URL
            PAYLOAD_API_KEY
        env:
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          BLOG_CLIENT_ID: ${{ secrets.BLOG_CLIENT_ID }}
          BLOG_REDIRECT_URI: ${{ secrets.BLOG_REDIRECT_URI }}
          BLOG_SIGNUP_FLOW_SLUG: ${{ secrets.BLOG_SIGNUP_FLOW_SLUG }}
          BLOG_SIGNUP_AUTHORIZATION_SPACE_ID: ${{ secrets.BLOG_SIGNUP_AUTHORIZATION_SPACE_ID }}
          BLOG_SIGNUP_TRIGGER_KIND: ${{ secrets.BLOG_SIGNUP_TRIGGER_KIND }}
          BLOG_SIGNUP_TRIGGER_CLIENT_ID: ${{ secrets.BLOG_SIGNUP_TRIGGER_CLIENT_ID }}
          BLOG_SIGNUP_TRIGGER_CLIENT_SECRET: ${{ secrets.BLOG_SIGNUP_TRIGGER_CLIENT_SECRET }}
          BLOG_SIGNUP_INTENT_TTL_SECONDS: ${{ secrets.BLOG_SIGNUP_INTENT_TTL_SECONDS }}
          PAYLOAD_BASE_URL: ${{ secrets.PAYLOAD_BASE_URL }}
          PAYLOAD_API_KEY: ${{ secrets.PAYLOAD_API_KEY }}

      - name: Deploy to Cloudflare (Preview)
        if: github.ref != 'refs/heads/master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.91.0
          command: deploy --env preview
          preCommands: pnpm exec opennextjs-cloudflare build
          secrets: |
            AUTH_BASE_URL
            BLOG_CLIENT_ID
            BLOG_REDIRECT_URI
            BLOG_SIGNUP_FLOW_SLUG
            BLOG_SIGNUP_AUTHORIZATION_SPACE_ID
            BLOG_SIGNUP_TRIGGER_KIND
            BLOG_SIGNUP_TRIGGER_CLIENT_ID
            BLOG_SIGNUP_TRIGGER_CLIENT_SECRET
            BLOG_SIGNUP_INTENT_TTL_SECONDS
            PAYLOAD_BASE_URL
            PAYLOAD_API_KEY
        env:
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          BLOG_CLIENT_ID: ${{ secrets.BLOG_CLIENT_ID }}
          BLOG_REDIRECT_URI: ${{ secrets.BLOG_REDIRECT_URI }}
          BLOG_SIGNUP_FLOW_SLUG: ${{ secrets.BLOG_SIGNUP_FLOW_SLUG }}
          BLOG_SIGNUP_AUTHORIZATION_SPACE_ID: ${{ secrets.BLOG_SIGNUP_AUTHORIZATION_SPACE_ID }}
          BLOG_SIGNUP_TRIGGER_KIND: ${{ secrets.BLOG_SIGNUP_TRIGGER_KIND }}
          BLOG_SIGNUP_TRIGGER_CLIENT_ID: ${{ secrets.BLOG_SIGNUP_TRIGGER_CLIENT_ID }}
          BLOG_SIGNUP_TRIGGER_CLIENT_SECRET: ${{ secrets.BLOG_SIGNUP_TRIGGER_CLIENT_SECRET }}
          BLOG_SIGNUP_INTENT_TTL_SECONDS: ${{ secrets.BLOG_SIGNUP_INTENT_TTL_SECONDS }}
          PAYLOAD_BASE_URL: ${{ secrets.PAYLOAD_BASE_URL }}
          PAYLOAD_API_KEY: ${{ secrets.PAYLOAD_API_KEY }}
