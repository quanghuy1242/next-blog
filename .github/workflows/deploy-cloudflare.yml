name: Deploy to Cloudflare

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Cache Next.js build artifacts
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx', '**/*.mjs', '**/*.cjs') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Validate required secrets
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          BLOG_CLIENT_ID: ${{ secrets.BLOG_CLIENT_ID }}
          BLOG_REDIRECT_URI: ${{ secrets.BLOG_REDIRECT_URI }}
          PAYLOAD_BASE_URL: ${{ secrets.PAYLOAD_BASE_URL }}
          PAYLOAD_API_KEY: ${{ secrets.PAYLOAD_API_KEY }}
        run: |
          for var in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN AUTH_BASE_URL BLOG_CLIENT_ID BLOG_REDIRECT_URI PAYLOAD_BASE_URL PAYLOAD_API_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::$var is missing"
              exit 1
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.85.0
          command: deploy
          preCommands: pnpm exec opennextjs-cloudflare build
          secrets: |
            AUTH_BASE_URL
            BLOG_CLIENT_ID
            BLOG_REDIRECT_URI
            PAYLOAD_BASE_URL
            PAYLOAD_API_KEY
        env:
          AUTH_BASE_URL: ${{ secrets.AUTH_BASE_URL }}
          BLOG_CLIENT_ID: ${{ secrets.BLOG_CLIENT_ID }}
          BLOG_REDIRECT_URI: ${{ secrets.BLOG_REDIRECT_URI }}
          PAYLOAD_BASE_URL: ${{ secrets.PAYLOAD_BASE_URL }}
          PAYLOAD_API_KEY: ${{ secrets.PAYLOAD_API_KEY }}
